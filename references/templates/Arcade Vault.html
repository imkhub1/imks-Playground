<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>imk's Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0c10;
    --surface-1: #14161c;
    --surface-2: #1a1d25;
    --border: #242832;
    --border-2: #333845;
    --text: #f2f3f5;
    --text-muted: #a7afbd;
    --text-faint: #8a92a3;
    --accent: #bef264;
    --accent-ink: #0b0c10;
    --accent-soft: rgba(190, 242, 100, 0.14);
    --accent-line: rgba(190, 242, 100, 0.55);
    --accent-glow: rgba(190, 242, 100, 0.25);
    --bloom: rgba(190, 242, 100, 0.10);
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #d97706;
    --radius-card: 12px;
    --radius-btn: 8px;
    --card-min: 258px;
    --card-lift: -4px;
    --card-scale: 1.02;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-hover: 0 18px 40px -18px rgba(0,0,0,0.8);
    --nav-bg: rgba(11, 12, 16, 0.85);
    --font-ui: "Geist", system-ui, -apple-system, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  html[data-theme="light"] {
    --bg: #f3f4f1;
    --surface-1: #ffffff;
    --surface-2: #ebedea;
    --border: #dfe2dc;
    --border-2: #cdd1c8;
    --text: #14161c;
    --text-muted: #545b66;
    --text-faint: #7b828d;
    --accent: #84cc16;
    --accent-ink: #f7fee7;
    --accent-soft: rgba(132, 204, 22, 0.16);
    --accent-line: rgba(101, 163, 13, 0.6);
    --accent-glow: rgba(132, 204, 22, 0.28);
    --bloom: rgba(132, 204, 22, 0.12);
    --shadow-card: 0 1px 2px rgba(20,22,28,0.06);
    --shadow-hover: 0 20px 44px -22px rgba(20,22,28,0.32);
    --nav-bg: rgba(243, 244, 241, 0.85);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    transition: background 0.35s ease, color 0.35s ease;
  }
  /* soft radial lime bloom behind everything */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(900px 600px at 50% -10%, var(--bloom), transparent 60%),
      radial-gradient(700px 500px at 85% 110%, var(--bloom), transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  ::selection { background: var(--accent-soft); color: var(--text); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  .mono { font-family: var(--font-mono); }

  /* view transition */
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .view-enter { animation: viewIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) both; }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 10px rgba(190,242,100,0); }
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-14px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes skeletonPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.85; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(-7px); }
    50% { transform: translateY(7px); }
  }
  @keyframes coverBall {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .cover-ball { animation: coverBall 1.8s ease-in-out infinite; transform-box: fill-box; }

  /* responsive */
  @media (max-width: 760px) {
    .nav-links { display: none !important; }
    .nav-right { display: none !important; }
    .nav-burger { display: flex !important; }
    .detail-grid { grid-template-columns: 1fr !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="views.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
